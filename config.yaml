# ============================================
# Job Monitor Bot — Конфигурация
# ============================================

telegram:
  bot_token: "8961809933:AAGJZIDEBLmIaiqgUrVoR06tAufGx8HDSLU"
  channel_id: "-1004492939022"
  # Как получить channel_id:
  # 1) Добавьте бота в канал как админа
  # 2) Напишите /start боту в канале
  # 3) Бот покажет channel_id

# Поисковые запросы (OR — ищем по любому из них)
search_queries:
  # C-level
  - "CIO"
  - "CTO"
  - "CPO"
  - "ИТ-директор"
  - "Директор по ИТ"
  - "Директор информационных технологий"
  - "Технический директор"
  - "IT Director"
  - "Head of IT"
  - "VP Engineering"
  - "Директор по цифровой трансформации"
  # Руководители ИТ
  - "Руководитель ИТ-департамента"
  - "Руководитель ИТ"
  - "Руководитель ИТ-инфраструктуры"
  # PMO / Управление проектами
  - "PMO"
  - "Head of PMO"
  - "Senior PM"
  - "Старший менеджер проектов"
  - "Руководитель проектного офиса"
  # Продуктовые роли
  - "Product Manager IT"
  - "Product Owner IT"
  - "Продуктовый менеджер ИТ"
  - "Продукт-менеджер"

# Города и форматы работы
locations:
  # hh.ru area IDs
  hh:
    - "2"      # Санкт-Петербург
    - "1002"   # Удалённо (remote)
    - "1003"   # Гибрид
  # Для avito и job.ru — текстовые запросы
  text:
    - "Санкт-Петербург"
    - "Санкт-Петербург и Ленобласть"
    - "Удалённо"
    - "Remote"
    - "Гибрид"

# Фильтры
filters:
  # Исключаемые ключевые слова (не показывать)
  exclude_keywords:
    - "стажёр"
    - "intern"
    - "junior"
    - "младший"
    - "помощник"
    - "ассистент"
    # Чистые разработчики (не руководители)
    - "разработчик"
    - "developer"
    - "engineer"
    - "программист"
    - "coding"
    # Чистые аналитики (не руководители)
    - "аналитик"
    - "analyst"
    - "специалист по данным"

  # Минимальная зарплата (если указана, в рублях)
  min_salary_rub: 150000

  # Только полная занятость
  full_time_only: false

# Настройки мониторинга
monitoring:
  # Интервал проверки (в секундах)
  check_interval: 3600  # 1 час

  # Максимум вакансий за одно обновление (0 = все новые)
  max_posts_per_update: 0

  # Задержка между постами (секунды)
  delay_between_posts: 2

# Прокси (опционально, для Avito)
# Avito блокирует IP датацентров — нужен residential прокси
# Примеры: "http://user:pass@host:port" или "socks5://host:port"
proxy:
  avito: ""  # Вставьте прокси сюда, например: "http://login:pass@proxy.example.com:8080"

# База данных
database:
  path: "vacancies.db"
